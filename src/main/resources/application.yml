spring:
  application:
    name: order-notification-service
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/order_notifications}
    username: ${DATABASE_USERNAME:order_notifications}
    password: ${DATABASE_PASSWORD:order_notifications}
  flyway:
    enabled: true
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    properties:
      security.protocol: ${KAFKA_SECURITY_PROTOCOL:PLAINTEXT}
      sasl.mechanism: ${KAFKA_SASL_MECHANISM:SCRAM-SHA-256}
      sasl.jaas.config: 'org.apache.kafka.common.security.scram.ScramLoginModule required username="${KAFKA_SASL_USERNAME:}" password="${KAFKA_SASL_PASSWORD:}";'
      ssl.truststore.type: ${KAFKA_SSL_TRUSTSTORE_TYPE:PEM}
      ssl.truststore.certificates: ${KAFKA_SSL_TRUSTSTORE_CERTIFICATES:}
    producer:
      acks: all
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false

server:
  port: ${PORT:8080}

management:
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,info

app:
  intake:
    rate-limit:
      enabled: ${INTAKE_RATE_LIMIT_ENABLED:true}
      max-requests: ${INTAKE_RATE_LIMIT_MAX_REQUESTS:100}
      window: ${INTAKE_RATE_LIMIT_WINDOW:1s}
  kafka:
    publish-timeout: ${KAFKA_PUBLISH_TIMEOUT:5s}
    topics:
      orders-received: ${ORDERS_RECEIVED_TOPIC:orders.received.v1}
      notifications-requested: ${NOTIFICATIONS_REQUESTED_TOPIC:notifications.requested.v1}
    consumers:
      order-audit:
        group-id: ${ORDER_AUDIT_CONSUMER_GROUP_ID:order-audit}
        concurrency: ${ORDER_AUDIT_CONCURRENCY:1}
        max-poll-records: ${ORDER_AUDIT_MAX_POLL_RECORDS:100}
      notification:
        group-id: ${NOTIFICATION_CONSUMER_GROUP_ID:notification}
        concurrency: ${NOTIFICATION_CONCURRENCY:1}
        max-poll-records: ${NOTIFICATION_MAX_POLL_RECORDS:50}
  notification-outbox:
    enabled: ${NOTIFICATION_OUTBOX_ENABLED:true}
    publish-interval: ${NOTIFICATION_OUTBOX_PUBLISH_INTERVAL:2s}
    batch-size: ${NOTIFICATION_OUTBOX_BATCH_SIZE:50}
    retry-delay: ${NOTIFICATION_OUTBOX_RETRY_DELAY:10s}
    max-attempts: ${NOTIFICATION_OUTBOX_MAX_ATTEMPTS:3}
